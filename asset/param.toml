[Detector]
    # 绿色通道二值化
    #@int 绿色通道二值化阈值
    threshold = 200

    # 轮廓面积过滤
    #@int 最小轮廓面积
    min_area = 1000
    #@int 最大轮廓面积
    max_area = 90000

    # 绿灯直径测距
    #@double 绿灯真实直径 (m)
    light_diameter = 0.050
    #@double 相机 x 方向焦距 (px)，需与 detector 输入图像尺寸一致
    camera_fx = 1200.0
    #@double 相机 y 方向焦距 (px)，需与 detector 输入图像尺寸一致
    camera_fy = 1200.0
    #@double detector 估计直径的像素标准差 (px)
    pixel_sigma = 2.0

    # 偏航目标线
    #@int 0 号飞镖目标线偏移 (px)
    yaw_offset_0 = 0

[Visualizer]
    # 调试窗口
    #@bool 是否显示 detector 调试窗口
    show_window = false
