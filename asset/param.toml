[Detector]
    # 绿色通道二值化
    #@int 绿色通道二值化阈值
    threshold = 200

    # 轮廓面积过滤
    #@int 最小轮廓面积
    min_area = 1000
    #@int 最大轮廓面积
    max_area = 90000

    # 绿灯直径测距
    #@double 绿灯真实直径 (m)
    light_diameter = 0.050
    #@double 相机 x 方向焦距 (px)，需与 detector 输入图像尺寸一致
    camera_fx = 1200.0
    #@double 相机 y 方向焦距 (px)，需与 detector 输入图像尺寸一致
    camera_fy = 1200.0
    #@double detector 估计直径的像素标准差 (px)
    pixel_sigma = 2.0

    # 飞镖序列
    #@int 电控当前飞镖序号的起始值，1 表示电控发送 1~4
    dart_number_base = 1
    #@int[] 四枚飞镖 id，按发射顺序填写
    dart_ids = [0, 1, 2, 3]

    # 偏航目标线偏移
    #@int id 为 0 的飞镖目标线偏移 (px)
    yaw_offset_0 = 0
    #@int id 为 1 的飞镖目标线偏移 (px)
    yaw_offset_1 = 132
    #@int id 为 2 的飞镖目标线偏移 (px)
    yaw_offset_2 = 0
    #@int id 为 3 的飞镖目标线偏移 (px)
    yaw_offset_3 = 0

[Visualizer]
    # 调试窗口
    #@bool 是否显示 detector 调试窗口
    show_window = false
